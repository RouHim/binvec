<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="water.css" rel="stylesheet">
    <link href="custom.css" rel="stylesheet">
    <script src="script.js" type="text/javascript"></script>
    <title>BinVec</title>
</head>
<body>
<div id="baseLayout">
    <button id="btnOpenImage" onclick="openImage()">Open image</button>
    <div id="imgSvgPreview"></div>
    <input id="sliderBinarizeThreshold" max="255" min="0" oninput="generateSvg()" step="1" type="range"
           value="128">
    <input id="sliderSpeckleThreshold" max="128" min="0" oninput="generateSvg()" step="1" type="range"
           value="4">
    <button id="btnSaveSvg" onclick="saveSvg()">Save SVG</button>
</div>
</body>
</html>
